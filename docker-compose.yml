services:

  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - postgres
      - mongo
      - redis
      - qdrant

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: searchdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  mongo_data:
  qdrant_data:
